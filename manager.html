<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="app-container">
    <nav id="sidebar">
        <div class="avatar-box" style="text-align: center; padding: 20px;">
            <div style="width: 80px; height: 80px; background: #333; border-radius: 50%; margin: 0 auto;"></div>
            <div class="user-info" style="margin-top: 15px; color: white;">
                <p id="display-name" style="font-weight: bold; font-size: 1.2em;"></p>
                <p id="display-role" style="color: #c5a059;"></p>
            </div>
        </div>

        <ul id="menu-list">
        </ul>

        <button id="logout-btn" onclick="handleLogout()">Logout</button>
    </nav>

    <main id="main-content">
        </main>
</div>

    <script src="sidebar.js"></script>
	<script>
    // สั่งให้สร้างเมนูทันทีที่หน้าเว็บโหลดเสร็จ
    window.onload = function() {
        renderMenu(); // หรือชื่อฟังก์ชันที่คุณตั้งไว้ใน sidebar.js
        			  // สามารถตั้งให้โหลดหน้าแรกให้อัตโนมัติก็ได้ครับ
        loadPage('dashboard'); 
    };
	</script>
</body>
</html>
