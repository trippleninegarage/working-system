<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <div class="app-container">
        <nav id="sidebar">
    		<div class="avatar-box" style="text-align: center; padding: 20px;">
        		<div style="width: 80px; height: 80px; background: #333; border-radius: 50%; margin: 0 auto;"></div>
        
        		<div class="user-info" style="margin-top: 15px; color: white;">
            		<p id="display-name" style="font-weight: bold; font-size: 1.2em;"></p>
            		<p id="display-role" style="color: #c5a059;"></p> 
				</div>
    		</div>
    
    		<ul id="menu-list">
        		</ul>
    
    		<button id="logout-btn" onclick="handleLogout()">Logout</button>
		</nav>

        <main id="main-content">
            <h1>ยินดีต้อนรับ Manager</h1>
            <div id="content-display">
                <p>เลือกเมนูทางซ้ายเพื่อเริ่มงานครับ</p>
            </div>
        </main>
    </div>

    <script src="sidebar.js"></script>
    <script>
        function handleLogout() {
            localStorage.removeItem('userRole');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
