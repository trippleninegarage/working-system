<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>TrippleNine Garage | Manager Dashboard</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #c34a36; --text: #e0e0e0; }
        body { margin: 0; display: flex; font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Header */
        header { position: fixed; top: 0; left: 250px; right: 0; height: 70px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--accent); z-index: 10; }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 45px; height: 45px; background: #444; border-radius: 50%; }
        .ai-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; }

        /* Sidebar */
        nav { width: 250px; background: var(--panel); border-right: 1px solid #333; padding: 20px; height: 100vh; flex-shrink: 0; }
        nav h2 { color: var(--accent); font-size: 18px; margin-bottom: 30px; text-align: center; }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 15px; cursor: pointer; border-radius: 5px; margin-bottom: 8px; transition: 0.3s; border-left: 3px solid transparent; }
        nav li:hover { background: #2a2a2a; border-left: 3px solid var(--accent); }
		
        /* Main Dashboard - รวมภาพพื้นหลังและความมืด 50% */
        main { 
            margin-top: 70px; 
            margin-left: 0; 
            flex-grow: 1; 
            padding: 30px; 
            overflow-y: auto; 
            background: linear-gradient(rgba(18, 18, 18, 0.5), rgba(18, 18, 18, 0.5)), url('manager-bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: calc(100vh - 70px);
        }

        #content-area { background: rgba(0, 0, 0, 0.6); padding: 20px; border-radius: 10px; min-height: 500px; }

        /* AI Modal */
        #aiModal { display:none; position:fixed; top:15%; left:30%; width:40%; height:60%; background:#1e1e1e; border:2px solid var(--accent); border-radius:15px; padding:20px; z-index:100; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <div class="user-profile">
            <div class="avatar"></div>
            <div>
                <div id="manager-name" style="font-size: 14px; font-weight: bold;">Manager Name</div>
                <button style="font-size: 10px; background: none; border: 1px solid #555; color: #888; cursor: pointer;">แก้ไขรูป</button>
            </div>
            <button style="margin-left: 15px; background: none; border: none; color: white; cursor: pointer; font-weight: bold;">🏠 Home</button>
        </div>
        <button class="ai-chat-btn" onclick="toggleChat()" style="background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px;">🤖 AI Chat</button>
    </header>

    <nav>
        <h2>TRIPPLENINE GARAGE</h2>
        <ul>
            <li onclick="openJobModal()">📂 JOB เปิดจ๊อบ</li>
            <li>📜 JOB History</li>
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <li>📦 Check Stock</li>
            <li>➕ Stock System</li>
            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
            <li>👥 User Manager</li>
        	<hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
			<li onclick="logout()" style="color: #ff4d4d; cursor: pointer;">⏻ Logout</li>
		</ul>
    </nav>

    <main>
        <div id="content-area">
            <h1>Dashboard</h1>
            <p>เลือกเมนูทางซ้าย เพื่อจัดการระบบ</p>
        </div>
    </main>

    <div id="aiModal">
        <h3 style="color:var(--accent)">AI Assistant</h3>
        <textarea style="width:100%; height:70%; background:#000; color:#fff; border:1px solid #333; padding:10px;"></textarea>
        <button style="margin-top:10px; width:100%; padding:10px; background:var(--accent); color:white; border:none; cursor:pointer;" onclick="toggleChat()">ปิด</button>
    </div>
	<div id="jobModal" style="display:none; position:fixed; top:10%; left:25%; width:50%; background:#1e1e1e; border:1px solid var(--accent); border-radius:10px; z-index:200; padding:30px;">
    	<h2 style="color:var(--accent)">เปิด JOB ใหม่</h2>
    	<form id="jobForm" style="display:flex; flex-direction:column; gap:10px;">
        	<select id="jobType" style="padding:10px; background:#000; color:white; border:1px solid #333;">
            	<option value="งานประกัน">งานประกัน</option>
            	<option value="ลูกค้าสด">ลูกค้าสด</option>
            	<option value="ขายอะไหล่">ขายอะไหล่</option>
        	</select>
        	<input type="text" id="custName" placeholder="ชื่อลูกค้า" style="padding:10px; background:#000; color:white; border:1px solid #333;">
        	<input type="text" id="carPlate" placeholder="ทะเบียนรถ (ถ้ามี)" style="padding:10px; background:#000; color:white; border:1px solid #333; margin-bottom:10px;">
			<input type="text" id="phone" placeholder="เบอร์โทรศัพท์" style="padding:10px; background:#000; color:white; border:1px solid #333;">
        	<textarea id="jobDetail" placeholder="รายละเอียดงาน" style="padding:10px; background:#000; color:white; border:1px solid #333; height:80px;"></textarea>
        	<button type="button" onclick="saveJob()" style="padding:10px; background:var(--accent); color:white; border:none; cursor:pointer;">บันทึก JOB</button>
        	<button type="button" onclick="closeJobModal()" style="padding:10px; background:#444; color:white; border:none; cursor:pointer;">ปิด</button>
    	</form>
	</div>
    <script>
    function toggleChat() {
        const modal = document.getElementById('aiModal');
        modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
    }

    // ฟังก์ชันเปิดหน้าต่าง JOB
    function openJobModal() {
        document.getElementById('jobModal').style.display = 'block';
    }
	
    // ฟังก์ชันปิดหน้าต่าง JOB
    function closeJobModal() {
        document.getElementById('jobModal').style.display = 'none';
    }

    // ฟังก์ชันบันทึก JOB
    function saveJob() {
        const url = "https://script.google.com/macros/s/AKfycbwaxZ8gCjps6EpLEYCGa2WgpsGw_lR6br4_cGiTRX4mlFTrh8LJ4zg_lRjUK7BEWHciCw/exec"; 
        
        // ดึงค่าจาก HTML มาเก็บไว้
        const payload = {
            jobType: document.getElementById('jobType').value,
            custName: document.getElementById('custName').value,
            carPlate: document.getElementById('carPlate') ? document.getElementById('carPlate').value : '-', 
            phone: document.getElementById('phone').value,
            jobDetail: document.getElementById('jobDetail').value
        };

        fetch(url, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("บันทึก JOB เรียบร้อย!");
            closeJobModal();
        })
        .catch(err => {
            alert("เกิดข้อผิดพลาด: " + err);
        });
    }
		
    function logout() {
        if(confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) {
            // ล้างข้อมูล Session หรือ Token (ตัวอย่าง)
            localStorage.clear(); 
            // เปลี่ยนหน้าไปยังหน้า Login
            window.location.href = "index.html"; // เปลี่ยนชื่อไฟล์ให้ตรงกับหน้า Login ของคุณ
        }
    }
</script>
</body>
</html>
