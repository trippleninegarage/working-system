<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Untitled Document</title>
</head>

<body>
	
	<div style="text-align: center; margin-top: 100px;">
        <h2>กรุณาเข้าสู่ระบบ</h2>
        <form id="loginForm">
            <div>
                <label for="username">ชื่อผู้ใช้งาน (Username):</label><br>
                <input type="text" id="username" required>
            </div>
            <br>
            <div>
                <label for="password">รหัสผ่าน (Password):</label><br>
                <input type="password" id="password" required>
            </div>
            <br>
            <button type="submit">เข้าสู่ระบบ</button>
        </form>
    </div>

	<script>
        document.getElementById('submitBtn').addEventListener('click', function(e) {
    		e.preventDefault(); // ล็อกหน้าเว็บไม่ให้รีเฟรชซ้ำสอง

    		var userVal = document.getElementById('username').value;
    		var passVal = document.getElementById('password').value;

            // ⚠️ ตรวจสอบและสลับเอาลิงก์ Web App (doGet) ตัวล่าสุดจาก Google Sheets ของคุณมาใส่ตรงนี้
            var webAppUrl = "https://script.google.com/macros/s/AKfycbyf0ViBvN5c5VG3x_ajh8dH5k_PAhmHCxK_U1w_Cf7fa-bn-gUgxtTtie143shnsAIy/exec"; 

            // ปรับโครงสร้างข้อมูลเป็นการยิงแบบ GET (ต่อท้าย URL) เพื่อทะลุกำแพง CORS บนระบบออนไลน์
            var finalUrl = webAppUrl + "?username=" + encodeURIComponent(userVal) + "&password=" + encodeURIComponent(passVal);

            console.log("กำลังเชื่อมต่อระบบเพื่อตรวจสอบสิทธิ์...");

            fetch(finalUrl)
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(data.message + " \nระดับสิทธิ์ของคุณคือ: " + data.role);
                    
                    // ระบบจะแยกทางเดินหน้าเว็บตามตำแหน่ง (Role) ของผู้ล็อกอินอัตโนมัติ
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (data.role === 'manager') {
                        window.location.href = 'manager.html';
                    } else if (data.role === 'user') {
                        window.location.href = 'user.html';
                    }
                } else {
                    alert(data.message); // กรณีรหัสผิดหรือหาชื่อไม่เจอ จะแจ้งเตือนตามที่ Sheet ส่งมา
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อหลังบ้าน กรุณาตรวจสอบลิงก์สคริปต์หรือการเชื่อมต่ออินเทอร์เน็ต');
            });
    </script>
  
</body>
</html>
