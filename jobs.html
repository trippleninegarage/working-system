<div class="job-container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Manage Jobs</h2>
        <button class="add-btn" onclick="openJobModal()">+ เพิ่มงานใหม่</button>
    </header>
    <input type="text" id="job-search" placeholder="ค้นหางาน (ทะเบียนรถ, ชื่อลูกค้า)..." onkeyup="filterJobs()">

    <div class="table-wrapper">
        <table id="job-table">
            <thead>
                <tr>
                    <th>ทะเบียน</th>
                    <th>รายการ</th>
                    <th>สถานะ</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="job-body">
                </tbody>
        </table>
    </div>
	<div id="jobModal" class="modal">
  		<div class="modal-content">
    		<span class="close" onclick="closeModal()">&times;</span>
    		<h2 id="modalTitle">รายละเอียดงาน</h2>
    		<div id="modalBody"></div>
  		</div>
	</div>
</div>
