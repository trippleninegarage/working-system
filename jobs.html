<div class="job-container">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Manage Jobs</h2>
        <button class="add-btn" onclick="openJobModal()">+ เพิ่มงานใหม่</button>
    </header>
    <input type="text" id="job-search" placeholder="ค้นหางาน (ทะเบียนรถ, ชื่อลูกค้า)..." onkeyup="filterJobs()">

    <div class="table-wrapper">
        <table id="job-table">
            <thead>
                <tr>
					<th>ชื่อลูกค้า</th>
                    <th>ทะเบียน</th>
                    <th>ประเภทลูกค้า</th>
                    <th>สถานะ</th>
                    <th>ผู้ดูแล</th>
                </tr>
            </thead>
            <tbody id="job-body">
                </tbody>
        </table>
    </div>
	<div id="jobModal" class="modal">
  		<div class="modal-content">
    		<span class="close" onclick="closeModal()">&times;</span>
    		<h2 id="modalTitle">รายละเอียดงาน</h2>
			<form id="jobForm" onsubmit="saveJob(event)">
  		<label style="color:white;">ประเภทลูกค้า:</label>
  			<select id="type" required style="width: 30%; padding: 10px; margin: 10px 0;">
    			<option value="ลูกค้าประกันภัย">ลูกค้าประกันภัย</option>
    			<option value="ลูกค้าเงินสด">ลูกค้าเงินสด</option>
    			<option value="ลูกค้าอะไหล่">ลูกค้าอะไหล่</option>
  			</select><br>

  		<input type="date" id="date" required><br>
  		<input type="text" id="customerName" placeholder="ชื่อลูกค้า" required><br>
  		<input type="tel" id="tel" placeholder="เบอร์โทรศัพท์"><br>
  		<input type="text" id="licensePlate" placeholder="ทะเบียนรถ" required><br>
  		<textarea id="description" placeholder="รายละเอียดงาน"></textarea><br>
  		<input type="number" id="serviceFee" placeholder="ค่าบริการ"><br>
  		<input type="number" id="partsCost" placeholder="ค่าอะไหล่"><br>
  
  		<input type="text" id="status" value="กำลังดำเนินการ" readonly><br>
  		<label style="color:white;">ผู้ดูแลเคส:</label>
		<input type="text" id="staffName" readonly style="width: 50%; padding: 10px; margin: 10px 0; background: #333; color: #fff; border: 1px solid #555;">
  		<button type="submit" class="add-btn">บันทึกข้อมูล</button>
	</form>
    		<div id="modalBody">
		
			</div>
  		</div>
	</div>
	
</div>
